<!DOCTYPE html>
<html>

<head>
<title>Checkout</title>
<script defer src="checkout.js"></script>
</head>

<body>

<h2>Checkout Form</h2>

<form id="orderForm">

<input id="name" placeholder="Name" required><br><br>

<input id="phone" placeholder="Phone" required><br><br>

<input id="pincode" placeholder="Pincode" required><br><br>

<input id="state" placeholder="State" required><br><br>

<textarea id="address" placeholder="Address" required></textarea><br><br>

<button type="submit">Place Order</button>

</form>

</body>
</html>
