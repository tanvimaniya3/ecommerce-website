<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<script defer src="checkout.js"></script>
</head>

<body>

<h2>Checkout</h2>

<!-- 🔥 TOTAL PRICE -->
<h3>Total: ₹<span id="totalPrice">0</span></h3>

<form id="orderForm">

<input type="text" id="name" placeholder="Full Name" required><br><br>

<input type="text" id="phone" placeholder="Phone Number" required><br><br>

<input type="text" id="pincode" placeholder="Pincode" required><br><br>

<input type="text" id="state" placeholder="State" required><br><br>

<textarea id="address" placeholder="Full Address" required></textarea><br><br>

<button type="submit">Place Order</button>

</form>

</body>
</html>
