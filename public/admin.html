<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

/* LOGIN */
.box{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card-login{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input, textarea, select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:black;
color:white;
border:none;
cursor:pointer;
}

#error{
color:red;
}

/* DASHBOARD */
#dashboard{
display:none;
padding:20px;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
flex:1;
min-width:150px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.order{
border:1px solid #ccc;
padding:15px;
margin-bottom:20px;
border-radius:10px;
background:white;
}
</style>

<script defer src="admin.js"></script>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="box">
<div class="card-login">

<h2>🔐 Admin Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard">

<h2>📊 Admin Dashboard</h2>

<button onclick="logout()" style="width:150px;">🚪 Logout</button>

<!-- 🔥 STATS -->
<div class="stats">
<div class="card" onclick="filterStatus('All')">📦 Orders: <span id="totalOrders">0</span></div>
<div class="card" onclick="filterStatus('Pending')">⏳ Pending: <span id="pendingCount">0</span></div>
<div class="card" onclick="filterStatus('Shipped')">🚚 Shipped: <span id="shippedCount">0</span></div>
<div class="card" onclick="filterStatus('Delivered')">✅ Delivered: <span id="deliveredCount">0</span></div>
<div class="card">💰 Revenue: ₹<span id="totalRevenue">0</span></div>
</div>

<h2>📦 All Orders</h2>

<!-- 🔍 SEARCH -->
<input 
type="text" 
id="searchInput" 
placeholder="🔍 Search name / phone / order id..."
onkeyup="searchOrders()"
style="padding:10px; width:300px; margin-bottom:20px;">

<div id="ordersBox"></div>

<hr><br>

<!-- ➕ ADD PRODUCT -->
<h2>➕ Add Product</h2>

<form id="productForm" enctype="multipart/form-data" style="background:white; padding:20px; border-radius:10px; max-width:400px;">

<input type="text" name="name" placeholder="Product Name" required>

<input type="number" name="price" placeholder="Price" required>

<select name="category">
<option value="cookware">Cookware</option>
<option value="appliances">Appliances</option>
<option value="storage">Storage</option>
<option value="dining">Dining</option>
</select>

<input type="file" name="image" required>

<textarea name="description" placeholder="Description"></textarea>

<input type="text" name="images" placeholder="Extra image URLs (comma separated)">

<button type="submit">Add Product</button>

</form>

</div>

</body>
</html>
