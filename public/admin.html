<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

/* LOGIN */
.box{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:black;
color:white;
border:none;
cursor:pointer;
}

#error{
color:red;
}

/* DASHBOARD */
#dashboard{
display:none;
padding:20px;
}

.order{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
}
</style>

<script defer src="admin.js"></script>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="box">

<div class="card">

<h2>🔐 Admin Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard">

<h2>📊 Admin Dashboard</h2>

<button onclick="logout()" style="width:150px;">🚪 Logout</button>

<div id="ordersBox"></div>

</div>

</body>
</html>
