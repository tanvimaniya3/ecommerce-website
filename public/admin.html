<!DOCTYPE html>
<html>

<head>
  <script>
if(localStorage.getItem("adminLogin") !== "true"){
window.location.href = "login.html";
}
</script>
<title>Admin Login</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:black;
color:white;
border:none;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Admin Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<!-- ✅ JS yahi add kiya hai (external file ki need nahi) -->
<script>

function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "admin" && pass === "1234"){

// ✅ correct key
localStorage.setItem("adminLogin","true");

// 👉 IMPORTANT: yaha apna admin page ka exact naam likho
window.location.href = "admin.html";

}else{

document.getElementById("error").innerText = "Wrong Username or Password ❌";

}

}

</script>

</body>
</html>
