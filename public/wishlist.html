<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - ShopSphere</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<div class="logo">
<a href="index.html">ShopSphere</a>
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Shop</a>
</nav>

<div class="icons">
<a href="cart.html">🛒</a>
</div>
</header>

<section class="products" style="margin-top:100px;">
<h2>My Wishlist ❤️</h2>

<div class="product-grid" id="wishlistBox">

<p>No products added yet.</p>

</div>
</section>
<script>

let ids = JSON.parse(localStorage.getItem("wishlist")) || [];

fetch("https://ecommerce-website-1-psvr.onrender.com/api/products")
.then(res => res.json())
.then(data => {

let box = document.getElementById("wishlistBox");

box.innerHTML = "";

let items = data.filter(p => ids.includes(p._id));

if(items.length == 0){
box.innerHTML = "<p>No Wishlist Products ❤️</p>";
return;
}

items.forEach(p => {

box.innerHTML += `
<div class="product">

<a href="product.html?id=${p._id}">
<img src="${p.image}">
<h3>${p.name}</h3>
</a>

<p class="new">₹${p.offerPrice || p.price}</p>

<button onclick="addToCart('${p._id}')">
Add to Cart
</button>

</div>
`;

});

});

</script>
</body>
</html>
