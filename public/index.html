<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopSphere</title>
<link rel="stylesheet" href="style.css">

<!-- JS FILE -->
<script defer src="script.js"></script>

</head>

<body>

<header class="navbar">

<div class="logo">
<a href="index.html">ShopSphere</a>
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
<a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
</nav>

<div class="icons">

<!-- 🔍 SEARCH ICON -->
<span class="search-icon" id="searchBtn" style="cursor:pointer;">🔍</span>

<!-- 🔍 SEARCH BOX -->
<input 
type="text" 
id="searchBox" 
placeholder="Search products..." 
class="search-input">

</div>

</header>

<!-- HERO -->
<section class="hero">
<div class="hero-text">
<h1>All You <span>Need</span></h1>
<p>Premium quality products for your home, lifestyle, and everyday needs.</p>
<button class="btn">Shop Now</button>
</div>
</section>

<!-- FEATURES -->
<section class="features">
<div>🚚 Free Shipping</div>
<div>🛡 Warranty</div>
<div>👨‍🍳 Chef Approved</div>
<div>⭐ Premium Quality</div>
</section>

<!-- PRODUCTS -->
<section class="products">
<h2>Featured Products</h2>
<div class="product-grid" id="productContainer"></div>
</section>

<!-- FOOTER -->
<footer>
<p>©️ 2026 ShopSphere</p>
</footer>

<!-- 🔥 FINAL SEARCH FIX (INLINE JS) -->
<script>
document.addEventListener("DOMContentLoaded", function(){

let btn = document.getElementById("searchBtn");
let box = document.getElementById("searchBox");

if(btn && box){

btn.addEventListener("click", function(){
box.classList.toggle("active");
box.focus();
});

box.addEventListener("keyup", function(e){
if(e.key === "Enter" && box.value.length > 2){
window.location.href = "products.html?search=" + box.value;
}
});

}

});
</script>

</body>
</html>
