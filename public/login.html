<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ShopSphere</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="products" style="min-height:100vh; display:flex; justify-content:center; align-items:center;">

<div class="product-card" style="max-width:420px; width:100%; padding:30px;">

<h2 style="margin-bottom:20px;">Login 👤</h2>

<input type="email" id="email" placeholder="Email Address"
style="width:100%;padding:12px;margin:10px 0;">

<input type="password" id="password" placeholder="Password"
style="width:100%;padding:12px;margin:10px 0;">

<button onclick="loginUser()">Login</button>

<p style="margin-top:15px;">
New user?
<a href="register.html">Create Account</a>
</p>

<p id="msg" style="margin-top:10px;"></p>

</div>

</section>

<script>
function loginUser(){

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

fetch("https://ecommerce-website-1-psvr.onrender.com/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
email:email,
password:password
})
})
.then(res => res.json())
.then(data => {

document.getElementById("msg").innerText = data.message;

if(data.message.includes("Success")){
localStorage.setItem("user", JSON.stringify(data.user));

setTimeout(()=>{

let go = localStorage.getItem("redirectAfterLogin") || "index.html";

localStorage.removeItem("redirectAfterLogin");

window.location.href = go;

},1000);

});
}
</script>

</body>
</html>
