<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
<script defer src="product.js"></script>
</head>

<body>

<header class="navbar">

<div class="logo">
<a href="index.html">ShopSphere</a>
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
</nav>

</header>

<section class="product-detail">

<div class="left">

<img id="pImage"
style="width:350px;height:350px;object-fit:contain;">

<!-- EXTRA IMAGES -->
<div id="extraImages"
style="display:flex;gap:10px;margin-top:10px;">
</div>

</div>

<div class="right">

<h1 id="pName"></h1>

<!-- PRICE -->
<p id="priceBox"></p>

<!-- STOCK -->
<p id="stockStatus"></p>

<!-- DESCRIPTION -->
<p id="pDesc"></p>

<!-- QTY -->
<div>
<button onclick="decreaseQty()">-</button>

<span id="qty">1</span>

<button onclick="increaseQty()">+</button>
</div>

<br>

<!-- BUTTONS -->
<button id="cartBtn"
onclick="addToCart()">
Add to Cart
</button>

<button id="buyBtn"
onclick="buyNow()">
Buy Now
</button>

</div>

</section>

</body>
</html>
