<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
<script defer src="product.js"></script>
</head>

<body>

<header class="navbar">

<div class="logo">
<a href="index.html">ShopSphere</a>
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
</nav>

</header>

<section class="product-detail-page">

<div class="product-main-box">

    <!-- LEFT -->
    <div class="product-gallery">

        <div class="main-product-image">
            <img id="pImage">
        </div>

        <div class="product-thumbs" id="extraImages">
        </div>

    </div>

    <!-- RIGHT -->
    <div class="product-info">

        <h1 id="pName"></h1>

        <div class="stars">
            ⭐⭐⭐⭐⭐ <span>(48 Reviews)</span>
        </div>

        <div class="product-price-box" id="priceBox">
        </div>

        <div id="stockStatus" class="stock-status"></div>

        <p id="pDesc" class="product-desc"></p>

        <!-- QTY -->
        <div class="qty-wrapper">

            <button class="qty-btn" onclick="decreaseQty()">−</button>

            <span id="qty" class="qty-number">1</span>

            <button class="qty-btn" onclick="increaseQty()">+</button>

        </div>

        <!-- BUTTONS -->
        <div class="product-btns">

            <button id="cartBtn" class="add-cart-btn" onclick="addToCart()">
                Add To Cart
            </button>

            <button id="buyBtn" class="buy-btn" onclick="buyNow()">
                Buy Now
            </button>

        </div>

        <!-- FEATURES -->
        <div class="product-features">

            <div class="product-feature">
                🚚 Free Shipping
            </div>

            <div class="product-feature">
                🔒 Secure Payment
            </div>

            <div class="product-feature">
                🔁 Easy Returns
            </div>

        </div>

    </div>

</div>

<!-- TABS -->
<div class="product-tabs">

    <div class="tab-buttons">

        <button class="active" onclick="showTab('descTab', this)">
            Description
        </button>

        <button onclick="showTab('reviewTab', this)">
            Reviews
        </button>

    </div>

    <div id="descTab" class="tab-panel active">
        <p id="fullDesc"></p>
    </div>

    <div id="reviewTab" class="tab-panel">

        <div class="review-box">
            ⭐⭐⭐⭐⭐ Amazing quality product!
        </div>

        <div class="review-box">
            ⭐⭐⭐⭐ Fast delivery and premium packaging.
        </div>

    </div>

</div>

</section>

</body>
</html>
