<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>
<script defer src="admin-orders.js"></script>

<style>
body{
font-family: Arial;
padding:20px;
background:#f5f5f5;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
flex:1;
min-width:150px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.order{
border:1px solid #ccc;
padding:15px;
margin-bottom:20px;
border-radius:10px;
background:white;
}
</style>

</head>

<body>

<h2>📊 Admin Dashboard</h2>

<!-- 🔥 CLICK FILTER CARDS -->
<div class="stats">

<div class="card" onclick="filterStatus('All')">📦 All <br><span id="totalOrders">0</span></div>

<div class="card" onclick="filterStatus('Pending')">⏳ Pending <br><span id="pendingCount">0</span></div>

<div class="card" onclick="filterStatus('Shipped')">🚚 Shipped <br><span id="shippedCount">0</span></div>

<div class="card" onclick="filterStatus('Delivered')">✅ Delivered <br><span id="deliveredCount">0</span></div>

<div class="card">💰 ₹<span id="totalRevenue">0</span></div>

</div>

<h2>📦 All Orders</h2>

<!-- 🔍 SEARCH -->
<input 
type="text" 
id="searchInput" 
placeholder="🔍 Search name / phone / order id..."
onkeyup="searchOrders()"
style="padding:10px; width:300px; margin-bottom:20px;">

<div id="ordersBox"></div>

</body>
</html>
