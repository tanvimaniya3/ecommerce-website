<!DOCTYPE html>
<html>

<head>
<title>Admin Orders</title>
<script defer src="admin-orders.js"></script>

<style>
body{
font-family: Arial;
padding:20px;
background:#f5f5f5;
}

/* HEADER */
h2{
margin-bottom:20px;
}

/* FILTER BAR */
.filter-bar{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.filter-bar input,
.filter-bar select{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* ORDER CARD */
.order{
background:white;
border:1px solid #ddd;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.order img{
border-radius:5px;
}

.order select{
margin-top:10px;
padding:8px;
border-radius:5px;
}
</style>

</head>

<body>

<h2>📦 All Orders</h2>

<!-- 🔍 SEARCH + FILTER -->
<div class="filter-bar">

<input 
type="text" 
id="searchOrder" 
placeholder="Search name / phone..." 
onkeyup="filterOrders()">

<select id="statusFilter" onchange="filterOrders()">
<option value="">All Orders</option>
<option value="Pending">Pending</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>
</select>

</div>

<!-- ORDERS -->
<div id="ordersBox"></div>

</body>
</html>
